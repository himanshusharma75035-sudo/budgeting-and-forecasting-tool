version: 2
updates:
  # Backend Python dependencies (pyproject.toml)
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "backend"]
    groups:
      backend-deps:
        patterns: ["*"]

  # Frontend npm dependencies
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "frontend"]
    groups:
      frontend-deps:
        patterns: ["*"]
    ignore:
      # typescript-eslint's peer range caps TypeScript at <6.1, so a TS major (7+) breaks linting.
      # Hold TS major bumps until typescript-eslint supports them, then remove this to upgrade.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # Keep GitHub Actions pinned actions up to date (and patch action CVEs)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "ci"]
