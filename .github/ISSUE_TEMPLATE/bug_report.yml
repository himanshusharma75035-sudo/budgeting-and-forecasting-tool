name: 🐞 Bug report
description: Report something that isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! Please **do not** include any confidential or production financial data.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. See error
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend (API / engine)
        - Frontend (UI)
        - Forecasting
        - Budgeting
        - Variance
        - Data import
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, Node version, browser (if UI).
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      description: Paste any error output. Redact sensitive values.
      render: shell
    validations:
      required: false
