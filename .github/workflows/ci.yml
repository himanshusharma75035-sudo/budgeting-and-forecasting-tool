name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Type check (mypy)
        run: mypy app
      - name: Tests
        run: pytest -q
      - name: License gate (no GPL/AGPL/Commercial deps)
        run: |
          pip install pip-licenses
          pip-licenses --format=csv > licenses.csv
          python - <<'PY'
          import csv, sys
          banned = ("GPL", "AGPL", "SSPL", "BSL", "Commercial", "Proprietary", "SEE LICENSE")
          # MIT/BSD/Apache/PSF/MPL/ISC are allowed; LGPL is allowed (dynamic linking).
          bad = []
          with open("licenses.csv") as f:
              for row in csv.DictReader(f):
                  lic = row.get("License", "")
                  name = row.get("Name", "")
                  up = lic.upper()
                  if any(b.upper() in up for b in banned) and "LGPL" not in up:
                      bad.append(f"{name}: {lic}")
          if bad:
              print("BANNED LICENSES FOUND:")
              print("\n".join(bad))
              sys.exit(1)
          print("License gate passed.")
          PY

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: npm ci
      - name: Type check + lint
        run: |
          npm run typecheck
          npm run lint
      - name: Tests
        run: npm run test -- --run
      - name: License gate
        run: |
          npx --yes license-checker --production --excludePackages "openfpa-frontend@0.1.0" \
            --onlyAllow "MIT;BSD;BSD-2-Clause;BSD-3-Clause;Apache-2.0;ISC;0BSD;CC0-1.0;Unlicense;MPL-2.0;Python-2.0;OFL-1.1"
