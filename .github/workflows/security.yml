name: Security

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"  # weekly, Monday 06:00 UTC

permissions:
  contents: read

jobs:
  # Known-CVE audit of Python dependencies. Non-blocking so a freshly disclosed
  # transitive advisory doesn't wedge the build; findings still surface in the log.
  python-audit:
    name: pip-audit (Python deps)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install + pip-audit
        run: |
          pip install -e ".[dev]"
          pip install pip-audit
      - name: Audit
        continue-on-error: true
        run: pip-audit --progress-spinner off

  # Known-CVE audit of npm dependencies (high severity and above).
  npm-audit:
    name: npm audit (frontend deps)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Audit
        continue-on-error: true
        run: npm audit --audit-level=high

  # Secret scanning — BLOCKING. No credential should ever land in history.
  secret-scan:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
